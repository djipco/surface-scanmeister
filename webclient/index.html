<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>ScanMeister Client</title>
    <script type="module" src="js/index.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="manifest" href="images/site.webmanifest">
  </head>

  <body>

    <section class="controls-panel" id="controls-panel">

      <h1 id="controls-panel-header">
        <span>PARAMETERS <span class="shortcut">(P)</span></span>
        <button type="button" id="controls-panel-close" aria-label="Close parameters">×</button>
      </h1>

      <div class="controls-panel-content">

      <div class="control-row">
        <label for="channel">Channel</label>
        <select id="channel" name="channel">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
          <option value="16">16</option>
        </select>
      </div>

      <div class="control-row">
        <label for="resolution">Resolution <span class="label-unit">(dpi)</span></label>
        <select id="resolution">
          <option value="75">75</option>
          <option value="100">100</option>
          <option value="150">150</option>
          <option value="300">300</option>
          <option value="600">600</option>
        </select>
      </div>

      <div class="control-row">
        <label for="width">Width <span class="label-unit">(mm)</span></label>
        <input type="number" id="width" name="width" min="0" max="5000" step="10" value="5000">
      </div>

      <div class="control-row">
        <label for="height">Height <span class="label-unit">(mm)</span></label>
        <input type="number" id="height" name="height" min="0" max="215" step="1" value="215">
      </div>

      <div class="control-row">
        <label for="brightness">Brightness</label>
        <input type="number" min="-100" max="100" step="1" value="25" id="brightness" class="drag-input">
      </div>

      <div class="control-row">
        <label for="contrast">Contrast</label>
        <input type="number" min="-100" max="100" step="1" value="30" id="contrast" class="drag-input">
      </div>

      <div class="control-row">
        <label for="draw-mode">Canvas</label>
        <select id="draw-mode">
          <option value="clear">Clear before scan</option>
          <option value="overlay">Keep existing image</option>
        </select>
      </div>

      <div class="control-row">
        <label for="render-mode">Display</label>
        <select id="render-mode">
          <option value="live">As received</option>
          <option value="speed">Fixed speed</option>
        </select>
      </div>

      <div class="control-row" id="render-speed-row">
        <label for="render-speed">Speed <span class="label-unit">(rows/s)</span></label>
        <input type="number" id="render-speed" min="10" max="200" step="1" value="100" disabled>
      </div>

      <div class="control-row">
        <label for="force-calibration">Force Calibration</label>
        <label class="toggle-switch">
          <input type="checkbox" id="force-calibration">
          <span></span>
        </label>
      </div>

      <div class="control-row">
        <label for="show-debug">Debug Info</label>
        <label class="toggle-switch">
          <input type="checkbox" id="show-debug">
          <span></span>
        </label>
      </div>

      <div class="button-row">
        <button type="button" id="fullscreen">Enter Fullscreen</button>
        <button id="scan">Scan</button>
      </div>

      </div>

    </section>

    <canvas id="canvas" width="319" height="439"></canvas>
    <span id="size" class="image-size-overlay">unknown</span>

    <section class="command-panel" id="command-panel">
      <span class="command-label"><span class="command-label-text">COMMAND</span></span>
      <code id="command">unknown</code>
    </section>

    <section class="render-stats hidden" id="render-stats">
      <h1 id="render-stats-header">STATS</h1>
      <div class="render-stats-content">
        <pre id="render-stats-text"></pre>
        <div class="stats-graph-title">Input <span class="label-unit">(rows/s)</span></div>
        <canvas id="arrive-graph" width="280" height="104"></canvas>
        <div class="stats-graph-title">Drawing Speed <span class="label-unit">(rows/s)</span></div>
        <canvas id="speed-graph" width="280" height="104"></canvas>
        <div class="stats-graph-title">FPS <span class="label-unit">(frames/s)</span></div>
        <canvas id="fps-graph" width="280" height="104"></canvas>
        <div class="stats-graph-title">Buffer <span class="label-unit">(rows)</span></div>
        <canvas id="buffer-graph" width="280" height="104"></canvas>
      </div>
    </section>

  </body>

</html>
