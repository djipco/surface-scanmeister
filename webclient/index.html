<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Image</title>
    <script type="module" src="js/index.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="manifest" href="images/site.webmanifest">
  </head>

  <body>

    <section class="controls-panel">

      <div class="control-row">
        <label for="channel">Channel</label>
        <input type="number" id="channel" name="channel" min="0" max="10" step="1" value="1">
      </div>

      <div class="control-row">
        <label for="resolution">Resolution</label>
        <select id="resolution">
          <option value="75">75</option>
          <option value="100">100</option>
          <option value="150">150</option>
          <option value="300">300</option>
          <option value="600">600</option>
        </select>
      </div>

      <div class="control-row">
        <label for="brightness">Brightness</label>
        <input type="range" min="-100" max="100" value="25" id="brightness">
      </div>

      <div class="control-row">
        <label for="contrast">Contrast</label>
        <input type="range" min="-100" max="100" value="30" id="contrast">
      </div>

      <div class="control-row">
        <label for="width">Width (mm)</label>
        <input type="number" id="width" name="width" min="1" max="5000" step="1">
      </div>

      <div class="control-row">
        <span>Size</span>
        <span id="size">unknown</span>
      </div>

      <div class="button-row">
        <button id="scan">Scan</button>
        <button id="fs-toggle">Fullscreen</button>
      </div>

    </section>

    <canvas id="canvas" width="319" height="439"></canvas>

    <section class="command-panel">
      <span>Command</span>
      <code id="command">unknown</code>
    </section>

  </body>

</html>
